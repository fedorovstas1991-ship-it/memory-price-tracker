<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Memory Prices</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090b;--bg2:#18181b;--bg3:#27272a;--bg4:#3f3f46;
  --border:#27272a;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
  --accent:#10b981;--blue:#3b82f6;--r:10px;--r-sm:6px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}

/* ── Header ── */
.header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header h1{font-size:16px;font-weight:700}
.header h1 span{color:var(--accent)}
.upd{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:3px 7px}

/* ── KPI ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin:0}
.kpi{background:var(--bg);padding:10px 8px;text-align:center}
.kpi-v{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.kpi-v.green{color:var(--accent)}
.kpi-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}

/* ── Filters ── */
.filters{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.f-row{display:flex;gap:6px;flex-wrap:wrap}
.f-input{flex:1;min-width:0;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;outline:none}
.f-input:focus{border-color:var(--accent)}
.f-input::placeholder{color:var(--text3)}
.f-sel{flex:1;min-width:0;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 6px;font-size:12px;outline:none;-webkit-appearance:none;appearance:none}
.btn{flex-shrink:0;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn.on{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:var(--accent)}

/* ── Chart ── */
.chart-wrap{margin:0 16px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.chart-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}
.chart-h{height:160px;position:relative}

/* ── Cards ── */
.list-hd{padding:8px 16px;display:flex;justify-content:space-between;align-items:center}
.list-hd-title{font-size:13px;font-weight:600;color:var(--text2)}
.list-count{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.cards{padding:0 12px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;transition:border-color 0.15s,box-shadow 0.15s;cursor:pointer}
.card:active{border-color:rgba(16,185,129,0.4);box-shadow:0 0 12px rgba(16,185,129,0.1)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card-chip{font-size:14px;font-weight:600;color:var(--text);word-break:break-all;flex:1;margin-right:8px}
.card-type{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.03em;flex-shrink:0}
.card-mid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.card-tag{font-size:11px;color:var(--text3);background:var(--bg3);border-radius:3px;padding:1px 5px}
.card-bot{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card-price{font-size:16px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
.card-rub{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.card-stock{font-size:11px;color:var(--accent);font-weight:500}
.card-stock.no{color:var(--text3)}
.card-link{margin-left:auto;font-size:11px;color:var(--blue);text-decoration:none;padding:4px 10px;border:1px solid rgba(59,130,246,0.3);border-radius:var(--r-sm)}
.card-src{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 6px}

/* ── Tabs ── */
.tab-btn{padding:5px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg2);color:var(--text3);font-size:11px;font-weight:600;cursor:pointer}
.tab-btn.on{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:var(--accent)}

/* ── Market tab ── */
#marketTab{display:none;padding:0}
.mkt-filters{padding:12px;display:flex;flex-direction:column;gap:8px}
.mkt-cats{display:flex;gap:4px;flex-wrap:wrap}
.mkt-section{margin-bottom:12px;padding:0 12px}
.mkt-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;padding-left:4px;display:flex;align-items:center;gap:6px}
.mkt-title span{font-size:14px}
.mkt-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:4px;cursor:pointer;transition:border-color 0.15s}
.mkt-card:active{border-color:rgba(16,185,129,0.4)}
.mkt-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.mkt-item{font-size:13px;font-weight:600;color:var(--text)}
.mkt-avg{font-size:15px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
.mkt-row2{display:flex;gap:8px;align-items:center}
.mkt-range{color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace}
.mkt-chg{font-size:11px;font-weight:600;padding:2px 6px;border-radius:3px}
.mkt-chg.up{color:#10b981;background:rgba(16,185,129,0.1)}
.mkt-chg.down{color:#ef4444;background:rgba(239,68,68,0.1)}
.mkt-chg.flat{color:var(--text3);background:var(--bg3)}
.mkt-src{font-size:10px;color:var(--text3)}

.load-more{display:block;margin:8px auto 24px;padding:10px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:13px;cursor:pointer}

/* ── Modal (neon) ── */
#overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#overlay.show{display:flex;align-items:flex-end;justify-content:center}
.modal{background:linear-gradient(180deg,#1a1a2e 0%,#0f0f1a 100%);border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px;border-top:1px solid rgba(16,185,129,0.3);box-shadow:0 -8px 40px rgba(16,185,129,0.1)}
.modal-handle{width:36px;height:4px;background:rgba(16,185,129,0.4);border-radius:2px;margin:0 auto 16px;box-shadow:0 0 8px rgba(16,185,129,0.3)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:4px;color:#fff;text-shadow:0 0 20px rgba(16,185,129,0.3)}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.modal-chart-wrap{height:200px;margin-bottom:16px;background:rgba(0,0,0,0.2);border-radius:var(--r);padding:8px;border:1px solid rgba(16,185,129,0.1)}
.modal-label{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.src-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:var(--r-sm);margin-bottom:4px;background:rgba(255,255,255,0.02);transition:background 0.15s}
.src-row:first-child{border-color:rgba(16,185,129,0.4);background:rgba(16,185,129,0.06);box-shadow:0 0 12px rgba(16,185,129,0.08)}
.src-name{font-size:13px;color:var(--text2)}
.src-price{font-size:15px;font-weight:600;font-family:'JetBrains Mono',monospace;color:#fff}
.src-row:first-child .src-price{color:var(--accent);text-shadow:0 0 10px rgba(16,185,129,0.4)}
.src-stock{font-size:11px;color:var(--text3);margin:0 8px}
.src-link{font-size:11px;color:var(--blue);text-decoration:none;padding:3px 8px;border:1px solid rgba(59,130,246,0.3);border-radius:4px}
</style>
</head>
<body>

<div class="header">
  <h1><span>Memory</span> Prices</h1>
  <div style="display:flex;gap:4px;align-items:center">
    <button class="tab-btn on" id="tabPrices" onclick="showTab('prices')">Каталог</button>
    <button class="tab-btn" id="tabMarket" onclick="showTab('market')">Рынок</button>
    <div class="upd" id="updBadge">--</div>
  </div>
</div>

<div class="kpis">
  <div class="kpi"><div class="kpi-v mono" id="kTotal">--</div><div class="kpi-l">Позиций</div></div>
  <div class="kpi"><div class="kpi-v mono green" id="kStock">--</div><div class="kpi-l">Со стоком</div></div>
  <div class="kpi"><div class="kpi-v mono" id="kSources">--</div><div class="kpi-l">Источников</div></div>
  <div class="kpi"><div class="kpi-v mono" id="kTypes">--</div><div class="kpi-l">Типов</div></div>
</div>

<div class="filters">
  <div class="f-row">
    <input class="f-input" id="searchAll" placeholder="Поиск по всему..." oninput="page=0;render()">
    <input class="f-input" id="searchChip" placeholder="Парт-номер..." oninput="page=0;render()">
  </div>
  <div class="f-row">
    <button class="btn" id="bFlash" onclick="toggle('flash')">Flash</button>
    <button class="btn" id="bRam" onclick="toggle('ram')">RAM</button>
    <button class="btn" id="bStock" onclick="toggle('stock')">Со стоком</button>
    <input class="f-input" id="minStock" type="number" placeholder="Мин. сток" oninput="page=0;render()" style="flex:0 0 90px;-moz-appearance:textfield">
    <button class="btn on" id="bSortAsc" onclick="setSort('price_usd',true)">$ ↑</button>
    <button class="btn" id="bSortDesc" onclick="setSort('price_usd',false)">$ ↓</button>
  </div>
  <div class="f-row">
    <select class="f-sel" id="selType" onchange="page=0;render()"><option value="">Все типы</option></select>
    <select class="f-sel" id="selBrand" onchange="page=0;render()"><option value="">Все бренды</option></select>
  </div>
  <div class="f-row">
    <select class="f-sel" id="selSource" onchange="page=0;render()"><option value="">Все источники</option></select>
    <input class="f-input" id="selCap" list="capDL" placeholder="Объём..." oninput="page=0;render()" style="flex:1">
    <datalist id="capDL"></datalist>
  </div>
</div>

<div style="display:flex;gap:8px;padding:0 12px;margin-bottom:12px;overflow-x:auto">
  <div class="chart-wrap" style="flex:1;min-width:0;margin:0">
    <div class="chart-title">Средняя цена (USD)</div>
    <div class="chart-h"><canvas id="chartSrc"></canvas></div>
  </div>
  <div class="chart-wrap" style="flex:1;min-width:0;margin:0">
    <div class="chart-title">Сток по источникам</div>
    <div class="chart-h"><canvas id="chartStock"></canvas></div>
  </div>
</div>

<div class="list-hd">
  <div class="list-hd-title">Результаты</div>
  <div class="list-count" id="listCount">--</div>
</div>
<div class="cards" id="cards"></div>
<button class="load-more" id="loadMore" onclick="page++;renderCards()" style="display:none">Загрузить ещё 25</button>

<div id="pricesTab"></div>
<div id="marketTab">
  <div class="mkt-filters">
    <input class="f-input" id="mktSearch" placeholder="Поиск (DDR4, Flash, MicroSD...)" oninput="mktSearch=this.value;renderMktCards()">
    <div class="f-row">
      <select class="f-sel" id="mktCap" onchange="renderMktCards()"><option value="">Все объёмы</option></select>
    </div>
    <div class="mkt-cats" id="mktCats"></div>
    <div style="font-size:10px;color:var(--text3);padding:0 4px">Биржевые бенчмарки — эталонные цены на типовые конфигурации чипов. Источники: DRAMeXchange, TrendForce.</div>
  </div>
  <div id="mktCards"></div>
</div>

<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-sub" id="mSub"></div>
    <div class="modal-label">Сравнение цен</div>
    <div class="modal-chart-wrap"><canvas id="mChart"></canvas></div>
    <div id="histWrap" style="display:none;margin-bottom:16px">
      <div class="modal-label">История цен</div>
      <div class="modal-chart-wrap"><canvas id="histCanvas"></canvas></div>
    </div>
    <div id="mSources"></div>
  </div>
</div>

<script>
const API_URL='';
const PAGE_SIZE=25;
const FLASH=['eMMC','UFS','NAND Flash','NOR Flash','NAND','NOR'];
const RAM=['DDR3','DDR4','DDR5','LPDDR4','LPDDR4X','LPDDR5','SRAM','SDRAM','DRAM'];

const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('#09090b');tg.setBackgroundColor('#09090b')}catch(e){}}

let allPrices=[],filtered=[],page=0;
let sortCol='price_usd',sortAsc=true;
let flags={flash:false,ram:false,stock:false};
let chart=null,detailChart=null;

Chart.defaults.color='#71717a';
Chart.defaults.borderColor='#27272a';
Chart.defaults.font.family="'Inter',system-ui,sans-serif";

function toggle(k){
  flags[k]=!flags[k];
  document.getElementById('b'+k[0].toUpperCase()+k.slice(1)).classList.toggle('on',flags[k]);
  page=0;render();
}

function setSort(col,asc){
  sortCol=col;sortAsc=asc;
  document.getElementById('bSortAsc').className='btn'+(asc?' on':'');
  document.getElementById('bSortDesc').className='btn'+(!asc?' on':'');
  page=0;render();
}

function getFiltered(){
  let d=allPrices;
  if(flags.flash||flags.ram){
    d=d.filter(r=>{
      const iF=FLASH.some(f=>r.type.toLowerCase().includes(f.toLowerCase()));
      const iR=RAM.some(f=>r.type.toLowerCase()===f.toLowerCase());
      if(flags.flash&&flags.ram)return iF||iR;
      if(flags.flash)return iF;
      return iR;
    });
  }
  const minS=parseInt(document.getElementById('minStock')?.value)||0;
  if(flags.stock)d=d.filter(r=>r.stock>0);
  if(minS>0)d=d.filter(r=>r.stock>=minS);
  const ft=document.getElementById('selType').value;
  const fb=document.getElementById('selBrand').value;
  const fs=document.getElementById('selSource').value;
  const fc=document.getElementById('selCap').value.trim().toLowerCase();
  if(ft)d=d.filter(r=>r.type===ft);
  if(fb)d=d.filter(r=>r.brand===fb);
  if(fs)d=d.filter(r=>r.source===fs);
  if(fc)d=d.filter(r=>(r.capacity||'').toLowerCase().includes(fc));
  const qa=(document.getElementById('searchAll').value||'').trim().toLowerCase();
  const qc=(document.getElementById('searchChip').value||'').trim().toLowerCase();
  if(qa)d=d.filter(r=>r.chip.toLowerCase().includes(qa)||(r.description||'').toLowerCase().includes(qa)||(r.brand||'').toLowerCase().includes(qa)||(r.type||'').toLowerCase().includes(qa));
  if(qc)d=d.filter(r=>r.chip.toLowerCase().includes(qc));
  const dir=sortAsc?1:-1;
  d=[...d].sort((a,b)=>{
    let va=a[sortCol]??'',vb=b[sortCol]??'';
    if(typeof va==='number')return(va-vb)*dir;
    return String(va).localeCompare(String(vb))*dir;
  });
  return d;
}

function updateSelectors(){
  const f={type:document.getElementById('selType').value,brand:document.getElementById('selBrand').value,source:document.getElementById('selSource').value};
  function sub(ex){
    let d=allPrices;
    if(flags.flash||flags.ram){d=d.filter(r=>{const iF=FLASH.some(f=>r.type.toLowerCase().includes(f.toLowerCase()));const iR=RAM.some(f=>r.type.toLowerCase()===f.toLowerCase());if(flags.flash&&flags.ram)return iF||iR;if(flags.flash)return iF;return iR;});}
    if(flags.stock)d=d.filter(r=>r.stock>0);
    const minS=parseInt(document.getElementById('minStock')?.value)||0;
    if(minS>0)d=d.filter(r=>r.stock>=minS);
    if(ex!=='type'&&f.type)d=d.filter(r=>r.type===f.type);
    if(ex!=='brand'&&f.brand)d=d.filter(r=>r.brand===f.brand);
    if(ex!=='source'&&f.source)d=d.filter(r=>r.source===f.source);
    return d;
  }
  function fill(sel,items,label,prev){
    sel.innerHTML='<option value="">'+label+'</option>'+items.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
    sel.value=items.includes(prev)?prev:'';
  }
  fill(document.getElementById('selType'),[...new Set(sub('type').map(r=>r.type))].sort(),'Все типы',f.type);
  fill(document.getElementById('selBrand'),[...new Set(sub('brand').map(r=>r.brand))].sort(),'Все бренды',f.brand);
  fill(document.getElementById('selSource'),[...new Set(sub('source').map(r=>r.source))].sort(),'Все источники',f.source);
  const caps=[...new Set(sub('').map(r=>r.capacity).filter(c=>c))].sort();
  document.getElementById('capDL').innerHTML=caps.map(c=>'<option value="'+c+'">').join('');
}

function render(){
  updateSelectors();
  filtered=getFiltered();
  // KPIs
  animN('kTotal',filtered.length);
  animN('kStock',filtered.filter(r=>r.stock>0).length);
  animN('kSources',new Set(filtered.map(r=>r.source)).size);
  animN('kTypes',new Set(filtered.map(r=>r.type)).size);
  document.getElementById('listCount').textContent=filtered.length.toLocaleString()+' шт';
  renderChart();
  page=0;renderCards();
}

function animN(id,target){
  const el=document.getElementById(id);
  const start=parseInt(el.textContent)||0;
  const dur=400,t0=performance.now();
  (function tick(now){
    const p=Math.min(1,(now-t0)/dur);
    el.textContent=Math.round(start+(target-start)*(1-Math.pow(1-p,3))).toLocaleString();
    if(p<1)requestAnimationFrame(tick);
  })(t0);
}

let chartStk=null;
function renderChart(){
  const srcMap={};
  filtered.forEach(r=>{
    if(!srcMap[r.source])srcMap[r.source]={sum:0,cnt:0,stock:0,withStock:0};
    srcMap[r.source].sum+=r.price_usd;srcMap[r.source].cnt++;
    srcMap[r.source].stock+=(r.stock||0);
    if(r.stock>0)srcMap[r.source].withStock++;
  });
  const entries=Object.entries(srcMap).map(([s,v])=>({s,avg:v.cnt?v.sum/v.cnt:0,cnt:v.cnt,stock:v.stock,withStock:v.withStock})).sort((a,b)=>a.avg-b.avg);
  const labels=entries.map(e=>e.s);
  const vals=entries.map(e=>+e.avg.toFixed(4));
  const colors=['#10b981','#3b82f6','#f59e0b','#ef4444','#06b6d4','#84cc16'];

  // Price chart
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('chartSrc'),{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:entries.map((_,i)=>colors[i%6]),borderRadius:4,barThickness:16}]},options:{
    indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+c.raw.toFixed(4)+' ('+entries[c.dataIndex].cnt+' шт)'}}},
    scales:{x:{grid:{display:false},ticks:{callback:v=>'$'+v,font:{size:9}}},y:{grid:{display:false},ticks:{font:{size:10}}}}
  }});

  // Stock chart
  const stockEntries=[...entries].sort((a,b)=>b.stock-a.stock);
  if(chartStk)chartStk.destroy();
  chartStk=new Chart(document.getElementById('chartStock'),{type:'bar',data:{
    labels:stockEntries.map(e=>e.s),
    datasets:[{data:stockEntries.map(e=>e.stock),backgroundColor:stockEntries.map((_,i)=>colors[i%6]+'99'),borderRadius:4,barThickness:16}]
  },options:{
    indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const e=stockEntries[c.dataIndex];return c.raw.toLocaleString()+' шт ('+e.withStock+' позиций)'}}}},
    scales:{x:{grid:{display:false},ticks:{callback:v=>v>=1000?(v/1000|0)+'K':v,font:{size:9}}},y:{grid:{display:false},ticks:{font:{size:10}}}}
  }});
}

function renderCards(){
  const shown=(page+1)*PAGE_SIZE;
  const slice=filtered.slice(0,shown);
  const container=document.getElementById('cards');
  container.innerHTML=slice.map(r=>{
    let href=r.link;
    if(r.source==='ebay')href='https://www.ebay.com/sch/i.html?_nkw='+encodeURIComponent(r.chip.split(/\s+/).slice(0,5).join(' '))+'&LH_BIN=1';
    else if(r.source==='jlcpcb')href='https://jlcpcb.com/parts/componentSearch?searchTxt='+encodeURIComponent(r.chip);
    else if(!href&&r.source==='lcsc')href='https://www.lcsc.com/search?q='+encodeURIComponent(r.chip);
    else if(!href&&r.source==='findchips')href='https://www.findchips.com/search/'+encodeURIComponent(r.chip);
    const stockHtml=r.stock>0?'<span class="card-stock">'+r.stock.toLocaleString()+' шт</span>':'<span class="card-stock no">нет</span>';
    const priceStr=r.price_usd<0.01?'$'+r.price_usd.toPrecision(2):'$'+r.price_usd.toFixed(2);
    const rubStr=r.price_rub?(r.price_rub.toLocaleString()+'₽'):'';
    const linkHtml=href?'<a class="card-link" href="'+href+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">Открыть</a>':'';
    return'<div class="card" onclick="openModal('+r.id+')">'+
      '<div class="card-top"><div class="card-chip">'+esc(r.chip)+'</div><div class="card-type">'+esc(r.type)+'</div></div>'+
      '<div class="card-mid"><span class="card-tag">'+esc(r.brand)+'</span>'+(r.capacity?'<span class="card-tag">'+esc(r.capacity)+'</span>':'')+'<span class="card-src">'+esc(r.source)+'</span></div>'+
      '<div class="card-bot"><span class="card-price">'+priceStr+'</span><span class="card-rub">'+rubStr+'</span>'+stockHtml+linkHtml+'</div>'+
    '</div>';
  }).join('');
  const btn=document.getElementById('loadMore');
  btn.style.display=filtered.length>shown?'block':'none';
  btn.textContent=filtered.length>shown?'Ещё 25 из '+filtered.length.toLocaleString():'Все загружены';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function openModal(id){
  const r=allPrices.find(p=>p.id===id);
  if(!r)return;
  document.getElementById('mTitle').textContent=r.chip;
  document.getElementById('mSub').textContent=[r.type,r.brand,r.capacity,r.description].filter(Boolean).join(' / ');
  const siblings=allPrices.filter(p=>p.chip===r.chip).sort((a,b)=>a.price_usd-b.price_usd);
  document.getElementById('mSources').innerHTML='<div class="modal-label">Цены по источникам</div>'+siblings.map((s,i)=>{
    let href=s.link;
    if(s.source==='ebay')href='https://www.ebay.com/sch/i.html?_nkw='+encodeURIComponent(s.chip.split(/\s+/).slice(0,5).join(' '))+'&LH_BIN=1';
    else if(s.source==='jlcpcb')href='https://jlcpcb.com/parts/componentSearch?searchTxt='+encodeURIComponent(s.chip);
    else if(!href&&s.source==='lcsc')href='https://www.lcsc.com/search?q='+encodeURIComponent(s.chip);
    else if(!href&&s.source==='findchips')href='https://www.findchips.com/search/'+encodeURIComponent(s.chip);
    const linkH=href?'<a class="src-link" href="'+href+'" target="_blank" onclick="event.stopPropagation()">Открыть &#8599;</a>':'';
    const priceStr=s.price_usd<0.01?'$'+s.price_usd.toPrecision(2):'$'+s.price_usd.toFixed(2);
    const stockH=s.stock>0?'<span class="src-stock">'+s.stock.toLocaleString()+' шт</span>':'<span class="src-stock">нет</span>';
    return'<div class="src-row"><span class="src-name">'+esc(s.source)+'</span>'+stockH+'<span class="src-price">'+priceStr+'</span>'+linkH+'</div>';
  }).join('');
  // Chart: always show source comparison
  if(detailChart)detailChart.destroy();
  const mCtx=document.getElementById('mChart').getContext('2d');
  const neonGrad=mCtx.createLinearGradient(0,0,300,0);
  neonGrad.addColorStop(0,'rgba(16,185,129,0.8)');neonGrad.addColorStop(1,'rgba(59,130,246,0.8)');
  detailChart=new Chart(mCtx,{type:'bar',data:{
    labels:siblings.map(s=>s.source+(s.stock>0?' ✓':'')),
    datasets:[{data:siblings.map(s=>s.price_usd),backgroundColor:siblings.map((s,i)=>i===0?neonGrad:'rgba(59,130,246,0.4)'),borderRadius:6,barThickness:20}]
  },options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+c.raw.toFixed(4)}}},scales:{x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#71717a',callback:v=>'$'+v}},y:{grid:{display:false},ticks:{color:'#a1a1aa'}}}}});
  // Load history async
  loadHistory(r.chip);
  document.getElementById('overlay').classList.add('show');
  if(tg?.BackButton){tg.BackButton.show();tg.BackButton.onClick(closeModal)}
}

let histChart=null;
async function loadHistory(chip){
  const el=document.getElementById('histWrap');
  el.style.display='none';
  try{
    const apiBase=API_URL||(location.origin+'/api/');
    const data=await fetchJ(apiBase+'history/'+encodeURIComponent(chip));
    if(!data||!data.length)return;
    // Group by source, show timeline
    const srcMap={};
    data.forEach(r=>{if(!srcMap[r.source])srcMap[r.source]=[];srcMap[r.source].push(r);});
    const dates=[...new Set(data.map(r=>r.date))].sort();
    if(dates.length<1)return;
    el.style.display='block';
    const colors=['#10b981','#3b82f6','#f59e0b','#ef4444','#06b6d4','#84cc16'];
    const datasets=Object.entries(srcMap).map(([src,pts],i)=>({
      label:src,
      data:dates.map(d=>{const p=pts.find(x=>x.date===d);return p?p.price_usd:null;}),
      borderColor:colors[i%6],backgroundColor:colors[i%6]+'33',
      tension:0.3,pointRadius:3,pointBackgroundColor:colors[i%6],fill:false,spanGaps:true
    }));
    if(histChart)histChart.destroy();
    histChart=new Chart(document.getElementById('histCanvas'),{type:'line',data:{labels:dates,datasets},options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#a1a1aa',boxWidth:10,font:{size:10}}}},
      scales:{x:{grid:{display:false},ticks:{color:'#71717a',font:{size:9}}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#71717a',callback:v=>'$'+v}}}
    }});
  }catch(e){console.log('No history:',e)}
}

// ── Tabs ──
function showTab(tab){
  document.getElementById('tabPrices').classList.toggle('on',tab==='prices');
  document.getElementById('tabMarket').classList.toggle('on',tab==='market');
  // prices tab = everything before marketTab
  document.querySelectorAll('.kpis,.filters,.chart-wrap,.list-hd,.cards,.load-more,[style*="display:flex;gap:8px;padding"]').forEach(el=>el.style.display=tab==='prices'?'':'none');
  document.getElementById('marketTab').style.display=tab==='market'?'block':'none';
  if(tab==='market'&&!window.__marketLoaded)loadMarket();
}

const CAT_META={
  dram_spot:{name:'DRAM Спот',icon:'💾'},dram_contract:{name:'DRAM Контракт',icon:'📋'},
  flash_spot:{name:'Flash Спот',icon:'⚡'},flash_contract:{name:'Flash Контракт',icon:'📋'},
  module_spot:{name:'Модули',icon:'🧩'},memory_card_spot:{name:'Карты памяти',icon:'💳'},
  emmc_spot:{name:'eMMC',icon:'📱'},ssd_spot:{name:'SSD',icon:'💿'}
};

let mktData={},mktCatFilter='',mktSearch='';

async function loadMarket(){
  document.getElementById('mktCards').innerHTML='<div style="text-align:center;padding:32px;color:var(--text3)">Загрузка...</div>';
  try{
    const apiBase=API_URL||(location.origin+'/api/');
    mktData=await fetchJ(apiBase+'market');
    window.__marketLoaded=true;
    renderMarket();
  }catch(e){
    document.getElementById('mktCards').innerHTML='<div style="text-align:center;padding:32px;color:#ef4444">Ошибка: '+esc(e.message)+'</div>';
  }
}

function renderMarket(){
  // Build category buttons (once)
  const cats=Object.keys(mktData).filter(c=>mktData[c].some(i=>i.session_avg&&Number(i.session_avg)>0.01));
  let btns='<button class="btn'+(mktCatFilter?'':' on')+'" onclick="mktCatFilter=\'\';renderMktCards()">Все</button>';
  cats.forEach(c=>{
    const m=CAT_META[c]||{name:c,icon:'📊'};
    btns+='<button class="btn'+(mktCatFilter===c?' on':'')+'" onclick="mktCatFilter=\''+c+'\';renderMktCards()">'+m.icon+' '+m.name+'</button>';
  });
  document.getElementById('mktCats').innerHTML=btns;
  // Populate volume dropdown from item names
  const volSet=new Set();
  for(const items of Object.values(mktData)){
    items.forEach(i=>{
      const m=i.item.match(/(\d+)\s*(Mb|Gb|GB|TB|MB|KB)/);
      if(m)volSet.add(m[1]+m[2]);
    });
  }
  const vols=[...volSet].sort((a,b)=>{
    const toBits=s=>{const n=parseInt(s);if(s.includes('TB'))return n*8*1024*1024;if(s.includes('GB'))return n*8*1024;if(s.includes('Gb'))return n*1024;if(s.includes('MB'))return n*8;if(s.includes('Mb'))return n;if(s.includes('KB'))return n*8/1024;return n;};
    return toBits(a)-toBits(b);
  });
  const selC=document.getElementById('mktCap');
  const prev=selC.value;
  const volLabel=v=>{
    if(v.endsWith('Gb'))return v+' (чип)';
    if(v.endsWith('GB'))return v+' (модуль)';
    if(v.endsWith('Mb'))return v+' (чип)';
    if(v.endsWith('MB'))return v+' (модуль)';
    return v;
  };
  selC.innerHTML='<option value="">Все объёмы</option>'+vols.map(v=>'<option value="'+v+'">'+volLabel(v)+'</option>').join('');
  selC.value=vols.includes(prev)?prev:'';
  renderMktCards();
}

function renderMktCards(){
  // Update cat buttons active state
  document.querySelectorAll('#mktCats .btn').forEach(b=>{
    const v=b.onclick?.toString().match(/mktCatFilter='([^']*)'/);
    if(v)b.classList.toggle('on',v[1]===mktCatFilter);
    else b.classList.toggle('on',!mktCatFilter);
  });
  const cats=Object.keys(mktData).filter(c=>mktData[c].some(i=>i.session_avg&&Number(i.session_avg)>0.01));
  const q=(document.getElementById('mktSearch')?.value||'').toLowerCase();
  const capVal=document.getElementById('mktCap')?.value||'';
  let html='';
  for(const cat of cats){
    if(mktCatFilter&&mktCatFilter!==cat)continue;
    const m=CAT_META[cat]||{name:cat,icon:'📊'};
    const good=mktData[cat].filter(i=>{
      if(!i.session_avg||Number(i.session_avg)<=0.01)return false;
      if(q&&!i.item.toLowerCase().includes(q))return false;
      if(capVal){const re=new RegExp('\\b'+capVal.replace(/([()])/g,'\\$1')+'\\b');if(!re.test(i.item))return false;}
      return true;
    });
    if(!good.length)continue;
    html+='<div class="mkt-section"><div class="mkt-title"><span>'+m.icon+'</span> '+esc(m.name)+' <span style="font-size:10px;color:var(--text3);font-weight:400">('+good.length+')</span></div>';
    // Group by item name to merge sources
    const byName={};
    good.forEach(i=>{if(!byName[i.item])byName[i.item]=[];byName[i.item].push(i);});
    Object.entries(byName).forEach(([name,arr])=>{
      // Build price lines per source
      let priceLines='';
      arr.forEach(i=>{
        const avg=Number(i.session_avg),avgStr='$'+avg.toFixed(2);
        const srcLabel=i.source==='dramexchange'?'DRAMeX':'TrendForce';
        const chg=String(i.session_change||'').trim();
        const chgNum=parseFloat(chg);
        let chgClass='flat',chgStr='';
        if(!isNaN(chgNum)&&chgNum>0){chgClass='up';chgStr='+'+chgNum.toFixed(2)+'%';}
        else if(!isNaN(chgNum)&&chgNum<0){chgClass='down';chgStr=chgNum.toFixed(2)+'%';}
        priceLines+='<div class="mkt-row2" style="margin-top:2px">'+
          '<span class="mkt-src">'+srcLabel+'</span>'+
          '<span class="mkt-avg" style="font-size:14px">'+avgStr+'</span>'+
          (chgStr?'<span class="mkt-chg '+chgClass+'">'+esc(chgStr)+'</span>':'')+
          '</div>';
      });
      html+='<div class="mkt-card" onclick="openMktHistory(\''+esc(name).replace(/'/g,"\\'")+'\')">'+
        '<div class="mkt-item" style="margin-bottom:4px">'+esc(name)+'</div>'+priceLines+'</div>';
    });
    html+='</div>';
  }
  if(!html)html='<div style="text-align:center;padding:32px;color:var(--text3)">Ничего не найдено</div>';
  document.getElementById('mktCards').innerHTML=html;
}

let mktHistChart=null;
async function openMktHistory(item){
  document.getElementById('mTitle').textContent=item;
  document.getElementById('mSub').textContent='Загрузка истории...';
  document.getElementById('mSources').innerHTML='';
  if(mktHistChart){mktHistChart.destroy();mktHistChart=null;}
  if(detailChart){detailChart.destroy();detailChart=null;}
  document.getElementById('overlay').classList.add('show');
  if(tg?.BackButton){tg.BackButton.show();tg.BackButton.onClick(closeModal)}
  try{
    const apiBase=API_URL||(location.origin+'/api/');
    const hist=await fetchJ(apiBase+'market/history/'+encodeURIComponent(item));
    const d0=hist[0]?.price_date||'',d1=hist[hist.length-1]?.price_date||'';
    document.getElementById('mSub').textContent='Источник: TrendForce · '+d0+' — '+d1+' ('+hist.length+' точек)';
    const dates=hist.map(h=>h.price_date||'');
    const avgs=hist.map(h=>Number(h.session_avg));
    const his=hist.map(h=>h.daily_high!=null?Number(h.daily_high):null);
    const los=hist.map(h=>h.daily_low!=null?Number(h.daily_low):null);
    const ctx=document.getElementById('mChart').getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,200);
    grad.addColorStop(0,'rgba(16,185,129,0.3)');grad.addColorStop(1,'rgba(16,185,129,0)');
    mktHistChart=new Chart(ctx,{type:'line',data:{labels:dates,datasets:[
      {label:'Средняя',data:avgs,borderColor:'#10b981',backgroundColor:grad,fill:true,tension:0.3,pointRadius:1,borderWidth:2},
      {label:'Макс',data:his,borderColor:'rgba(239,68,68,0.4)',borderDash:[4,4],pointRadius:0,borderWidth:1,fill:false},
      {label:'Мин',data:los,borderColor:'rgba(59,130,246,0.4)',borderDash:[4,4],pointRadius:0,borderWidth:1,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
      plugins:{legend:{labels:{color:'#a1a1aa',boxWidth:10,font:{size:10}}},tooltip:{callbacks:{label:c=>c.dataset.label+': $'+c.raw?.toFixed(2)}}},
      scales:{x:{grid:{display:false},ticks:{color:'#71717a',font:{size:8},maxTicksLimit:8}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#71717a',callback:v=>'$'+v}}}
    }});
    // Stats from graph + all sources for this item
    const tfLast=avgs[avgs.length-1],tfFirst=avgs[0];
    const tfChange=tfFirst>0?((tfLast-tfFirst)/tfFirst*100).toFixed(1):'?';
    const min=Math.min(...avgs.filter(v=>v>0)),max=Math.max(...avgs);
    // Collect all sources for this item
    let srcHtml='';
    for(const[cat,items] of Object.entries(mktData)){
      items.filter(i=>i.item===item&&Number(i.session_avg)>0).forEach(i=>{
        const p=Number(i.session_avg);
        const src=i.source==='dramexchange'?'DRAMeXchange (сегодня)':'TrendForce ('+d1+')';
        srcHtml+='<div class="src-row"><span class="src-name">'+esc(src)+'</span><span class="src-price">$'+p.toFixed(2)+'</span></div>';
      });
    }
    document.getElementById('mSources').innerHTML=
      '<div class="modal-label" style="margin-top:12px">Источники</div>'+srcHtml+
      '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:12px">'+
      '<div class="src-row"><span class="src-name">За период</span><span class="src-price" style="color:'+(parseFloat(tfChange)>=0?'var(--accent)':'#ef4444')+'">'+tfChange+'%</span></div>'+
      '<div class="src-row"><span class="src-name">TF последняя</span><span class="src-price">$'+tfLast.toFixed(2)+'</span></div>'+
      '<div class="src-row"><span class="src-name">Минимум</span><span class="src-price">$'+min.toFixed(2)+'</span></div>'+
      '<div class="src-row"><span class="src-name">Максимум</span><span class="src-price">$'+max.toFixed(2)+'</span></div></div>';
  }catch(e){
    document.getElementById('mSub').textContent='Только текущая цена (DRAMeXchange). История появится при следующих обновлениях.';
    // Show current price from mktData
    for(const[cat,items] of Object.entries(mktData)){
      const found=items.find(i=>i.item===item&&Number(i.session_avg)>0);
      if(found){
        const avg=Number(found.session_avg);
        document.getElementById('mSources').innerHTML=
          '<div class="src-row" style="border-color:var(--accent)"><span class="src-name">Текущая цена</span><span class="src-price" style="color:var(--accent)">$'+avg.toFixed(2)+'</span></div>'+
          (found.daily_high?'<div class="src-row"><span class="src-name">Диапазон</span><span class="src-price">$'+Number(found.daily_low).toFixed(2)+' — $'+Number(found.daily_high).toFixed(2)+'</span></div>':'')+
          '<div style="font-size:11px;color:var(--text3);margin-top:8px;text-align:center">Источник: '+esc(found.source)+' · Обновляется каждые 4 часа</div>';
        break;
      }
    }
  }
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  if(tg?.BackButton)tg.BackButton.hide();
}

function fmtTime(iso){
  if(!iso)return'--';
  try{const d=new Date(iso),now=new Date(),m=Math.round((now-d)/60000);
    if(m<1)return'только что';if(m<60)return m+' мин назад';
    const h=Math.round(m/60);if(h<24)return h+' ч назад';
    return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
  }catch(e){return'--'}
}

async function fetchJ(url){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),30000);
  try{const r=await fetch(url,{signal:ctrl.signal});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}finally{clearTimeout(t)}
}

async function init(){
  const apiBase=API_URL||(location.origin+'/api/');
  const t=Date.now();
  try{
    const[stats,prices]=await Promise.all([
      fetchJ(apiBase+'stats?_t='+t),
      fetchJ(apiBase+'prices?limit=50000&sort=price_usd&order=asc&_t='+t)
    ]);
    let data=Array.isArray(prices)?prices:(prices.items||[]);
    allPrices=data.map(p=>{
      let cap=p.capacity||'';
      if(!cap){const m=(p.description||'').match(/(\d+)\s*(Mbit|Gbit|[MGKT]B)/i);if(m)cap=m[1]+m[2];}
      return{...p,type:p.chip_type||p.type||'',chip:p.part_number||p.chip||'',link:p.url||p.link||'',stock:p.stock??p.moq??0,capacity:cap};
    });
    allPrices.forEach((p,i)=>{if(p.id===undefined)p.id=i;});
    document.getElementById('updBadge').textContent=fmtTime(stats?.updated);
    render();
  }catch(e){
    console.error('API error:',e);
    document.getElementById('updBadge').textContent='Ошибка: '+e.message;
  }
}
init();
