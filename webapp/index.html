<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Memory Price Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0b;--bg2:#141416;--bg3:#1c1c1f;--bg4:#242428;
  --border:#27272a;--border-subtle:#1e1e21;
  --text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
  --accent:#10b981;--accent-muted:rgba(16,185,129,0.12);
  --red:#ef4444;--red-muted:rgba(239,68,68,0.12);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
}
body{
  font-family:'Geist',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  padding:0 16px 80px;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace}

/* Header — left aligned */
.header{padding:20px 0 4px;text-align:left}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.03em;color:var(--text)}
.header .sub{font-size:12px;color:var(--text3);margin-top:2px;letter-spacing:-0.01em}

/* Metrics — horizontal scroll */
.metrics{display:flex;gap:8px;margin:16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.metrics::-webkit-scrollbar{display:none}
.metric{
  flex:0 0 auto;min-width:90px;
  background:var(--bg2);border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);padding:12px 14px;
}
.metric .val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;letter-spacing:-0.02em}
.metric .lbl{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500}

/* Filters */
.filters{display:flex;gap:6px;overflow-x:auto;padding:12px 0;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.pill{
  flex:0 0 auto;padding:6px 14px;border-radius:20px;
  background:transparent;color:var(--text3);font-size:12px;font-weight:600;
  border:1px solid var(--border);cursor:pointer;white-space:nowrap;
  font-family:'Geist',system-ui,sans-serif;
  transition:all 0.15s ease;
}
.pill:active{transform:scale(0.97)}
.pill.active{background:var(--accent-muted);color:var(--accent);border-color:transparent}

/* Cards */
.cards{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.card{
  background:var(--bg2);border:1px solid var(--border-subtle);
  border-radius:var(--radius);padding:16px;cursor:pointer;
  transition:transform 0.12s ease,background 0.15s ease;
  opacity:0;animation:cardIn 0.3s ease forwards;
}
.card:active{transform:scale(0.985);background:var(--bg3)}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}

.card-row{display:flex;justify-content:space-between;align-items:flex-start}
.card-chip{font-size:14px;font-weight:600;letter-spacing:-0.02em;color:var(--text)}
.card-badge{
  font-size:10px;font-weight:600;padding:3px 8px;
  border-radius:var(--radius-xs);background:var(--bg4);color:var(--text3);
  letter-spacing:0.02em;
}
.card-desc{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.3}
.card-prices{display:flex;gap:12px;margin-top:12px;align-items:baseline}
.card-usd{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;letter-spacing:-0.03em}
.card-rub{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text3)}
.card-footer{display:flex;justify-content:space-between;margin-top:10px;align-items:center}
.card-meta{font-size:10px;color:var(--text3);letter-spacing:0.01em}
.delta{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;border-radius:var(--radius-xs)}
.delta-up{background:var(--red-muted);color:var(--red)}
.delta-down{background:var(--accent-muted);color:var(--accent)}
.delta-flat{background:var(--bg4);color:var(--text3)}

/* Skeleton loaders */
.skeleton{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.skel-card{
  background:var(--bg2);border:1px solid var(--border-subtle);
  border-radius:var(--radius);padding:16px;height:130px;
  position:relative;overflow:hidden;
}
.skel-card::after{
  content:'';position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{to{left:100%}}

/* Modal — liquid glass */
.overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:100;align-items:flex-end;justify-content:center;
}
.overlay.show{display:flex}
.modal{
  background:var(--bg2);
  border:1px solid var(--border);
  border-bottom:none;
  border-radius:20px 20px 0 0;
  width:100%;max-height:85vh;padding:12px 16px 32px;
  overflow-y:auto;
  box-shadow:0 -8px 40px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);
}
.modal-handle{width:32px;height:3px;background:var(--bg4);border-radius:2px;margin:0 auto 14px}
.modal h2{font-size:17px;font-weight:700;letter-spacing:-0.03em}
.modal .sub{font-size:12px;color:var(--text3);margin-top:2px;margin-bottom:16px}
.chart-wrap{height:220px;margin-bottom:16px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border-subtle);
}
.source-name{font-size:12px;color:var(--text3)}
.source-price{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600}

.empty{text-align:center;padding:48px 16px;color:var(--text3);font-size:13px;line-height:1.5}
</style>
</head>
<body>
<div class="header">
  <h1>Memory Prices</h1>
  <div class="sub" id="lastUpdate">Loading data...</div>
</div>
<div class="metrics" id="metrics"></div>
<div class="filters" id="filters"></div>
<div class="cards" id="cards">
  <div class="skeleton">
    <div class="skel-card"></div><div class="skel-card"></div>
    <div class="skel-card"></div><div class="skel-card"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle"></h2>
    <div class="sub" id="modalSub"></div>
    <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
    <div class="source-list" id="sourcePrices"></div>
  </div>
</div>

<script>
const SHEET_ID='1utDQUWzUZFR1tSYs9miedmzEWMDaic7xCLKBwkF52c8';
const GIDS={'Prices Now':2138457408,'History':825033088};
const CSV_URL=g=>`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${g}`;

let allPrices=[],historyData=[],activeFilter='All',chart=null;

const tg=window.Telegram?.WebApp;
if(tg){tg.expand();tg.setHeaderColor('#0a0a0b');tg.setBackgroundColor('#0a0a0b');
  if(tg.BackButton)tg.BackButton.onClick(()=>closeModal())}

function parseCSV(text){
  const lines=text.split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=parseLine(lines[0]);
  return lines.slice(1).map(line=>{
    const vals=parseLine(line);
    const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||''});return obj;
  });
}
function parseLine(line){
  const r=[];let c='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(q){if(ch==='"'&&line[i+1]==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}
    else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}else c+=ch}
  }
  r.push(c.trim());return r;
}

async function fetchSheet(sheet){
  const resp=await fetch(CSV_URL(GIDS[sheet]));
  return parseCSV(await resp.text());
}

function groupByChip(prices){
  const m={};
  for(const p of prices){
    const k=p['Chip']||'';if(!k)continue;
    if(!m[k])m[k]={best:p,sources:[]};
    if(+p['Price USD']<+m[k].best['Price USD'])m[k].best=p;
    m[k].sources.push(p);
  }
  return m;
}

function getDelta(chip){
  const e=historyData.filter(h=>h['Part Number']===chip&&h['Price USD'])
    .sort((a,b)=>(a['Date']||'').localeCompare(b['Date']||''));
  if(e.length<2)return null;
  const prev=+e[e.length-2]['Price USD'],curr=+e[e.length-1]['Price USD'];
  return prev?((curr-prev)/prev*100).toFixed(1):null;
}

function renderMetrics(prices){
  const types=new Set(prices.map(p=>p['Type']));
  const sources=new Set(prices.map(p=>p['Source']));
  document.getElementById('lastUpdate').textContent=prices[0]?.['Updated']||'No data';
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="val">${prices.length}</div><div class="lbl">Prices</div></div>
    <div class="metric"><div class="val">${types.size}</div><div class="lbl">Types</div></div>
    <div class="metric"><div class="val">${sources.size}</div><div class="lbl">Sources</div></div>
    <div class="metric"><div class="val">${historyData.length}</div><div class="lbl">History</div></div>`;
}

function renderFilters(prices){
  const types=['All',...new Set(prices.map(p=>p['Type']).filter(Boolean))];
  document.getElementById('filters').innerHTML=types.map(t=>
    `<button class="pill${t===activeFilter?' active':''}" onclick="setFilter('${t}')">${t}</button>`).join('');
}
function setFilter(t){activeFilter=t;renderFilters(allPrices);renderCards()}

function renderCards(){
  const filtered=activeFilter==='All'?allPrices:allPrices.filter(p=>p['Type']===activeFilter);
  const grouped=groupByChip(filtered);
  const container=document.getElementById('cards');
  const entries=Object.entries(grouped);
  if(!entries.length){container.innerHTML='<div class="empty">No prices found</div>';return}

  container.innerHTML=entries.map(([chip,data],i)=>{
    const p=data.best;
    const usd=(+p['Price USD']).toFixed(2);
    const rub=p['Price RUB']?(+p['Price RUB']).toFixed(0):'--';
    const d=getDelta(chip);
    let dH='';
    if(d!==null){
      const cls=d>0?'delta-up':d<0?'delta-down':'delta-flat';
      dH=`<span class="delta ${cls}">${d>0?'+':''}${d}%</span>`;
    }
    return`<div class="card" style="animation-delay:${i*30}ms" onclick="openModal('${chip.replace(/'/g,"\\'")}')">
      <div class="card-row"><span class="card-chip">${chip}</span><span class="card-badge">${p['Type']||''}</span></div>
      <div class="card-desc">${p['Description']||''}</div>
      <div class="card-prices"><span class="card-usd">$${usd}</span><span class="card-rub">${rub} RUB</span></div>
      <div class="card-footer"><span class="card-meta">${data.sources.length} source${data.sources.length>1?'s':''}</span>${dH}</div>
    </div>`;
  }).join('');
}

function openModal(chip){
  const grouped=groupByChip(allPrices);
  const data=grouped[chip];if(!data)return;
  document.getElementById('modalTitle').textContent=chip;
  document.getElementById('modalSub').textContent=data.best['Description']||data.best['Type']||'';

  document.getElementById('sourcePrices').innerHTML=data.sources
    .sort((a,b)=>(+a['Price USD'])-(+b['Price USD']))
    .map(s=>`<div class="source-row"><span class="source-name">${s['Source']}</span><span class="source-price">$${(+s['Price USD']).toFixed(2)}</span></div>`).join('');

  const entries=historyData.filter(h=>h['Part Number']===chip&&h['Price USD'])
    .sort((a,b)=>(a['Date']||'').localeCompare(b['Date']||''));
  const ctx=document.getElementById('priceChart').getContext('2d');
  if(chart)chart.destroy();

  if(entries.length){
    const bySource={};
    for(const e of entries){const src=e['Source']||'?';if(!bySource[src])bySource[src]=[];bySource[src].push({x:e['Date'],y:+e['Price USD']})}
    const colors=['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];
    chart=new Chart(ctx,{type:'line',
      data:{datasets:Object.entries(bySource).map(([src,pts],i)=>({
        label:src,data:pts,borderColor:colors[i%6],backgroundColor:colors[i%6]+'15',
        borderWidth:1.5,tension:0.3,pointRadius:2,fill:true}))},
      options:{animation:false,responsive:true,maintainAspectRatio:false,
        interaction:{intersect:false,mode:'index'},
        scales:{
          x:{ticks:{color:'#71717a',font:{size:9,family:'JetBrains Mono'}},grid:{color:'#1c1c1f'}},
          y:{ticks:{color:'#71717a',font:{size:9,family:'JetBrains Mono'},callback:v=>'$'+v},grid:{color:'#1c1c1f'}}},
        plugins:{legend:{labels:{color:'#a1a1aa',font:{size:10,family:'Geist'}}},
          tooltip:{backgroundColor:'#141416',borderColor:'#27272a',borderWidth:1,
            titleColor:'#fafafa',bodyColor:'#a1a1aa',titleFont:{family:'Geist'},bodyFont:{family:'JetBrains Mono'},
            callbacks:{label:c=>`${c.dataset.label}: $${c.parsed.y.toFixed(2)}`}}}}});
  } else {
    chart=new Chart(ctx,{type:'line',data:{labels:['No history'],datasets:[{data:[0],borderColor:'#27272a'}]},
      options:{animation:false,responsive:true,maintainAspectRatio:false}});
  }
  document.getElementById('overlay').classList.add('show');
  if(tg?.BackButton)tg.BackButton.show();
}
function closeModal(){document.getElementById('overlay').classList.remove('show');if(tg?.BackButton)tg.BackButton.hide()}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal()});

async function init(){
  try{
    const[prices,history]=await Promise.all([fetchSheet('Prices Now'),fetchSheet('History')]);
    allPrices=prices;historyData=history;
    renderMetrics(prices);renderFilters(prices);renderCards();
  }catch(err){
    document.getElementById('cards').innerHTML=`<div class="empty">Failed to load data<br><small style="color:var(--text3)">${err.message}</small></div>`;
  }
}
init();
</script>
</body>
</html>
