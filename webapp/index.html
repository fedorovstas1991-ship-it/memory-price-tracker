<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Memory Prices</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090b;--bg2:#18181b;--bg3:#27272a;--bg4:#3f3f46;
  --border:#27272a;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
  --accent:#10b981;--blue:#3b82f6;--r:10px;--r-sm:6px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}

/* ── Header ── */
.header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header h1{font-size:16px;font-weight:700}
.header h1 span{color:var(--accent)}
.upd{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:3px 7px}

/* ── KPI ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin:0}
.kpi{background:var(--bg);padding:10px 8px;text-align:center}
.kpi-v{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.kpi-v.green{color:var(--accent)}
.kpi-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}

/* ── Filters ── */
.filters{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.f-row{display:flex;gap:6px;flex-wrap:wrap}
.f-input{flex:1;min-width:0;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;outline:none}
.f-input:focus{border-color:var(--accent)}
.f-input::placeholder{color:var(--text3)}
.f-sel{flex:1;min-width:0;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 6px;font-size:12px;outline:none;-webkit-appearance:none;appearance:none}
.btn{flex-shrink:0;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn.on{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:var(--accent)}

/* ── Chart ── */
.chart-wrap{margin:0 16px 12px;background:var(--bg2);border:1px solid rgba(16,185,129,0.15);border-radius:var(--r);padding:12px;box-shadow:0 0 20px rgba(16,185,129,0.03)}
.chart-title{font-size:12px;font-weight:600;color:rgba(16,185,129,0.7);margin-bottom:8px}
.chart-h{height:160px;position:relative}

/* ── Cards ── */
.list-hd{padding:8px 16px;display:flex;justify-content:space-between;align-items:center}
.list-hd-title{font-size:13px;font-weight:600;color:var(--text2)}
.list-count{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.cards{padding:0 12px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;transition:border-color 0.15s,box-shadow 0.15s;cursor:pointer}
.card:active{border-color:rgba(16,185,129,0.4);box-shadow:0 0 12px rgba(16,185,129,0.1)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card-chip{font-size:14px;font-weight:600;color:var(--text);word-break:break-all;flex:1;margin-right:8px}
.card-type{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.03em;flex-shrink:0}
.card-mid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.card-desc{font-size:11px;color:var(--text2);margin-bottom:6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tag{font-size:11px;color:var(--text3);background:var(--bg3);border-radius:3px;padding:1px 5px}
.card-bot{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card-price{font-size:16px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
.card-rub{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.card-stock{font-size:11px;color:var(--accent);font-weight:500}
.card-stock.no{color:var(--text3)}
.card-link{margin-left:auto;font-size:11px;color:var(--blue);text-decoration:none;padding:4px 10px;border:1px solid rgba(59,130,246,0.3);border-radius:var(--r-sm)}
.card-src{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 6px}

/* ── Tabs ── */
.tab-btn{padding:5px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg2);color:var(--text3);font-size:11px;font-weight:600;cursor:pointer}
.tab-btn.on{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:var(--accent)}

/* ── Market tab ── */
#marketTab{display:none;padding:0}
.mkt-filters{padding:12px;display:flex;flex-direction:column;gap:8px}
.mkt-cats{display:flex;gap:4px;flex-wrap:wrap}
.mkt-section{margin-bottom:12px;padding:0 12px}
.mkt-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;padding-left:4px;display:flex;align-items:center;gap:6px}
.mkt-title span{font-size:14px}
.mkt-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:4px;cursor:pointer;transition:border-color 0.15s}
.mkt-card:active{border-color:rgba(16,185,129,0.4)}
.mkt-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.mkt-item{font-size:13px;font-weight:600;color:var(--text)}
.mkt-avg{font-size:15px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
.mkt-row2{display:flex;gap:8px;align-items:center}
.mkt-range{color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace}
.mkt-chg{font-size:11px;font-weight:600;padding:2px 6px;border-radius:3px}
.mkt-chg.up{color:#10b981;background:rgba(16,185,129,0.1)}
.mkt-chg.down{color:#ef4444;background:rgba(239,68,68,0.1)}
.mkt-chg.flat{color:var(--text3);background:var(--bg3)}
.mkt-src{font-size:10px;color:var(--text3)}

.load-more{display:block;margin:8px auto 24px;padding:10px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:13px;cursor:pointer}

/* ── Modal (neon) ── */
#overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#overlay.show{display:flex;align-items:flex-end;justify-content:center}
.modal{background:linear-gradient(180deg,#1a1a2e 0%,#0f0f1a 100%);border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px;border-top:1px solid rgba(16,185,129,0.3);box-shadow:0 -8px 40px rgba(16,185,129,0.1)}
.modal-handle{width:36px;height:4px;background:rgba(16,185,129,0.4);border-radius:2px;margin:0 auto 16px;box-shadow:0 0 8px rgba(16,185,129,0.3)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:4px;color:#fff;text-shadow:0 0 20px rgba(16,185,129,0.3)}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:16px}
.modal-chart-wrap{height:200px;margin-bottom:16px;background:rgba(0,0,0,0.2);border-radius:var(--r);padding:8px;border:1px solid rgba(16,185,129,0.1)}
.modal-label{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.src-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:var(--r-sm);margin-bottom:4px;background:rgba(255,255,255,0.02);transition:background 0.15s}
.src-row:first-child{border-color:rgba(16,185,129,0.4);background:rgba(16,185,129,0.06);box-shadow:0 0 12px rgba(16,185,129,0.08)}
.src-name{font-size:13px;color:var(--text2)}
.src-price{font-size:15px;font-weight:600;font-family:'JetBrains Mono',monospace;color:#fff}
.src-row:first-child .src-price{color:var(--accent);text-shadow:0 0 10px rgba(16,185,129,0.4)}
.src-stock{font-size:11px;color:var(--text3);margin:0 8px}
.src-link{font-size:11px;color:var(--blue);text-decoration:none;padding:3px 8px;border:1px solid rgba(59,130,246,0.3);border-radius:4px}

/* ── Cap Panel ── */
.cap-group-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:4px 12px 2px}
.cap-chips{display:flex;gap:4px;flex-wrap:wrap;padding:0 12px 8px}
.cap-chip{padding:5px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg3);color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap}
.cap-chip.on{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:var(--accent)}

/* ── Loader bar ── */
#loader{position:fixed;top:0;left:0;width:100%;height:3px;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.15s}
#loader.active{opacity:1}
#loader::after{content:'';display:block;height:100%;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:loader-slide 1s linear infinite}
@keyframes loader-slide{from{transform:translateX(-100%)}to{transform:translateX(200%)}}
</style>
</head>
<body>
<div id="loader"></div>

<div class="header">
  <h1><span>Memory</span> Prices</h1>
  <div style="display:flex;gap:4px;align-items:center">
    <button class="tab-btn on" id="tabPrices" onclick="showTab('prices')">Каталог</button>
    <button class="tab-btn" id="tabMarket" onclick="showTab('market')">Рынок</button>
    <div class="upd" id="updBadge">--</div>
  </div>
</div>

<div class="kpis">
  <div class="kpi"><div class="kpi-v mono" id="kTotal">--</div><div class="kpi-l">Позиций</div></div>
  <div class="kpi"><div class="kpi-v mono green" id="kStock">--</div><div class="kpi-l">Со стоком</div></div>
  <div class="kpi"><div class="kpi-v mono" id="kSources">--</div><div class="kpi-l">Источников</div></div>
  <div class="kpi"><div class="kpi-v mono" id="kTypes">--</div><div class="kpi-l">Типов</div></div>
</div>

<div class="filters">
  <div class="f-row">
    <input class="f-input" id="searchAll" placeholder="Поиск по всему..." oninput="debouncedLoad()">
    <button class="btn" id="bReset" onclick="resetFilters()" style="flex:0 0 auto;font-size:11px;padding:8px 10px" title="Сбросить фильтры">✕</button>
  </div>
  <div class="f-row">
    <button class="btn" id="bFlash" onclick="toggleGroup('flash')">Flash</button>
    <button class="btn" id="bRam" onclick="toggleGroup('ram')">RAM</button>
    <button class="btn" id="bStock" onclick="toggleStock()">Со стоком</button>
    <input class="f-input" id="minStock" type="number" placeholder="Мин. сток" oninput="debouncedLoad()" style="flex:0 0 90px;-moz-appearance:textfield">
    <button class="btn on" id="bSortAsc" onclick="setSort('price_usd',true)">$ ↑</button>
    <button class="btn" id="bSortDesc" onclick="setSort('price_usd',false)">$ ↓</button>
    <button class="btn" id="bStockAsc" onclick="setSort('stock',true)">📦↑</button>
    <button class="btn" id="bStockDesc" onclick="setSort('stock',false)">📦↓</button>
  </div>
  <div class="f-row">
    <select class="f-sel" id="selType" onfocus="selSave(this)" onchange="selApply(this)" onblur="selApply(this)"><option value="">Все типы</option></select>
    <select class="f-sel" id="selBrand" onfocus="selSave(this)" onchange="selApply(this)" onblur="selApply(this)"><option value="">Все бренды</option></select>
  </div>
  <div class="f-row">
    <select class="f-sel" id="selSource" onfocus="selSave(this)" onchange="selApply(this)" onblur="selApply(this)"><option value="">Все источники</option></select>
    <button class="f-sel" id="capBtn" onclick="toggleCapPanel()" style="text-align:left;cursor:pointer">Все объёмы</button>
  </div>
</div>

<div id="capPanel" style="display:none;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin:0 16px 8px;padding:8px 0 0">
  <div id="capGroups"></div>
  <div style="display:flex;gap:6px;justify-content:flex-end;padding:8px 12px 8px">
    <button class="btn" onclick="clearCapFilter()">Сбросить</button>
    <button class="btn on" onclick="applyCapFilter()">Применить</button>
  </div>
</div>

<div id="chartsSection" style="padding:0 12px;margin-bottom:12px">
  <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:8px">
    <button class="btn" id="chartToggle" onclick="toggleCharts()" style="font-size:10px">Свернуть</button>
  </div>
  <div id="chartsContent">
    <div class="chart-wrap" style="margin:0 0 8px">
      <div class="chart-title" style="color:rgba(16,185,129,0.7)">Цены по объёмам (USD)</div>
      <div class="chart-h" style="height:220px"><canvas id="chartCapPrice"></canvas></div>
      <button class="btn" id="expandPriceChart" onclick="expandChart('price')" style="width:100%;margin-top:6px;font-size:11px;display:none">Показать все</button>
    </div>
    <div class="chart-wrap" style="margin:0 0 8px">
      <div class="chart-title" id="stockChartTitle" style="color:rgba(16,185,129,0.7)">Стоки по объёмам</div>
      <div class="chart-h" style="height:220px"><canvas id="chartCapStock"></canvas></div>
      <button class="btn" id="expandStockChart" onclick="expandChart('stock')" style="width:100%;margin-top:6px;font-size:11px;display:none">Показать все</button>
    </div>
    <div class="chart-wrap" style="margin:0">
      <div class="chart-title" style="color:rgba(16,185,129,0.7)">Лучшие сделки (скидка vs история, сток ≥100)</div>
      <div class="chart-h" style="height:220px"><canvas id="chartDeals"></canvas></div>
      <button class="btn" id="expandDealsChart" onclick="expandChart('deals')" style="width:100%;margin-top:6px;font-size:11px;display:none">Показать все</button>
    </div>
  </div>
</div>

<div class="list-hd">
  <div class="list-hd-title">Результаты</div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn" id="exportBtn" onclick="exportCSV()" style="font-size:10px;padding:4px 8px">CSV ↓</button>
    <div class="list-count" id="listCount">--</div>
  </div>
</div>
<div class="cards" id="cards"></div>
<button class="load-more" id="loadMore" onclick="loadMore()" style="display:none">Загрузить ещё</button>

<div id="pricesTab"></div>
<div id="marketTab">
  <div class="mkt-filters">
    <input class="f-input" id="mktSearch" placeholder="Поиск (DDR4, Flash, MicroSD...)" oninput="mktSearch=this.value;renderMktCards()">
    <div class="f-row">
      <select class="f-sel" id="mktCap" onchange="renderMktCards()"><option value="">Все объёмы</option></select>
    </div>
    <div class="mkt-cats" id="mktCats"></div>
    <div style="font-size:10px;color:var(--text3);padding:0 4px">Биржевые бенчмарки — эталонные цены на типовые конфигурации чипов. Источники: DRAMeXchange, TrendForce.</div>
  </div>
  <div id="mktCards"></div>
</div>

<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-sub" id="mSub"></div>
    <div class="modal-label">Сравнение цен</div>
    <div class="modal-chart-wrap"><canvas id="mChart"></canvas></div>
    <div id="histWrap" style="display:none;margin-bottom:16px">
      <div class="modal-label">История цен</div>
      <div class="modal-chart-wrap"><canvas id="histCanvas"></canvas></div>
    </div>
    <div id="mSources"></div>
  </div>
</div>

<script>
const API_URL='';
const PAGE_SIZE=50;

const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('#09090b');tg.setBackgroundColor('#09090b')}catch(e){}}

const FLASH_TYPES=['eMMC','UFS','NAND Flash','NOR Flash','NAND','NOR'];
const RAM_TYPES=['DDR3','DDR4','DDR5','LPDDR4','LPDDR4X','LPDDR5','SRAM','SDRAM','DRAM'];

let allPrices=[],totalCount=0,currentOffset=0;
let sortCol='price_usd',sortAsc=true;
let flags={flash:false,ram:false,stock:false};
let detailChart=null;
let chartCapPrice=null, chartCapStock=null, chartDeals=null;
let chartsVisible=true;
let _debounceTimer=null;
let _loadingPrices=false;
let _pendingLoad=false;
let suppressSelectEvents=false;
let _selSnap={};
let allTypes=[],allBrands=[],allSources=[];
let lastMeta=null;

// Capacity multi-select state
let _selectedCaps=[];
let _capOptions=[];

const CAP_GROUPS=[
  {key:'Kbit',label:'Kbit (килобит)',match:/K(?:bit|b)$/},
  {key:'Mbit',label:'Mbit (мегабит)',match:/M(?:bit|b)$/},
  {key:'Gbit',label:'Gbit (гигабит)',match:/G(?:bit|b)$/},
  {key:'Tbit',label:'Tbit (терабит)',match:/T(?:bit|b)$/},
  {key:'KB',label:'KB (килобайт)',match:/KB$/},
  {key:'MB',label:'MB (мегабайт)',match:/MB$/},
  {key:'GB',label:'GB (гигабайт)',match:/GB$/},
  {key:'TB',label:'TB (терабайт)',match:/TB$/},
];

function toggleCapPanel(){
  const panel=document.getElementById('capPanel');
  const isOpen=panel.style.display!=='none';
  panel.style.display=isOpen?'none':'block';
  if(!isOpen)renderCapChips();
}

function renderCapChips(){
  const container=document.getElementById('capGroups');
  let html='';
  for(const grp of CAP_GROUPS){
    const items=_capOptions.filter(o=>grp.match.test(o.val));
    if(!items.length)continue;
    items.sort((a,b)=>capSortToBits(a.val)-capSortToBits(b.val));
    html+='<div class="cap-group-title">'+grp.label+'</div><div class="cap-chips">';
    for(const o of items){
      const sel=_selectedCaps.includes(o.val);
      html+='<button class="cap-chip'+(sel?' on':'')+'" onclick="event.stopPropagation();toggleCapChip(\''+esc(o.val)+'\')">'+esc(o.val)+(o.count?' ('+o.count+')':'')+'</button>';
    }
    html+='</div>';
  }
  // Any items that don't match a group
  const ungrouped=_capOptions.filter(o=>!CAP_GROUPS.some(g=>g.match.test(o.val)));
  if(ungrouped.length){
    ungrouped.sort((a,b)=>capSortToBits(a.val)-capSortToBits(b.val));
    html+='<div class="cap-group-title">Другие</div><div class="cap-chips">';
    for(const o of ungrouped){
      const sel=_selectedCaps.includes(o.val);
      html+='<button class="cap-chip'+(sel?' on':'')+'" onclick="event.stopPropagation();toggleCapChip(\''+esc(o.val)+'\')">'+esc(o.val)+(o.count?' ('+o.count+')':'')+'</button>';
    }
    html+='</div>';
  }
  container.innerHTML=html;
}

function toggleCapChip(val){
  const idx=_selectedCaps.indexOf(val);
  if(idx>=0)_selectedCaps.splice(idx,1);
  else _selectedCaps.push(val);
  renderCapChips();
}

function applyCapFilter(){
  document.getElementById('capPanel').style.display='none';
  updateCapBtn();
  loadPrices();
}

function clearCapFilter(){
  _selectedCaps=[];
  document.getElementById('capPanel').style.display='none';
  updateCapBtn();
  loadPrices();
}

function updateCapBtn(){
  const btn=document.getElementById('capBtn');
  if(_selectedCaps.length===0)btn.textContent='Все объёмы';
  else if(_selectedCaps.length===1)btn.textContent=_selectedCaps[0];
  else btn.textContent=_selectedCaps.length+' объёмов';
}

Chart.defaults.color='#71717a';
Chart.defaults.borderColor='rgba(16,185,129,0.06)';
Chart.defaults.font.family="'Inter',system-ui,sans-serif";

function debouncedLoad(){clearTimeout(_debounceTimer);_debounceTimer=setTimeout(()=>loadPrices(),300);}

// Filters: save value on focus, fire loadPrices on blur only if changed.
// 50ms delay on blur ensures `change` event has updated el.value first
// (on iOS Telegram WebView, blur can fire before change).
function selSave(el){_selSnap[el.id]=el.value;}
function selApply(el){
  if(suppressSelectEvents)return;
  setTimeout(()=>{
    if(suppressSelectEvents)return;
    if(el.value===_selSnap[el.id])return;
    _selSnap[el.id]=el.value;
    loadPrices();
  },50);
}

function toggleGroup(g){
  flags[g]=!flags[g];
  document.getElementById('b'+g[0].toUpperCase()+g.slice(1)).classList.toggle('on',flags[g]);

function getActiveTypes(){

  if(flags.flash)types=types.concat(FLASH_TYPES);

  return types;
}

function buildQuery(offset,limit){
  const params=new URLSearchParams();
  const q=(document.getElementById('searchAll')?.value||'').trim();
  const fb=document.getElementById('selBrand')?.value||'';
  const fs=document.getElementById('selSource')?.value||'';
  if(q)params.set('search',q);
  // Type filter: specific dropdown OR group buttons
  const types=getActiveTypes();
  if(types.length>0)params.set('type',types.join(','));
  if(fb)params.set('brand',fb);
  if(fs)params.set('source',fs);
  if(_selectedCaps.length>0)params.set('capacity',_selectedCaps[0]);
  // Stock filters
  if(flags.stock)params.set('in_stock','true');
  const minS=parseInt(document.getElementById('minStock')?.value)||0;
  if(minS>0)params.set('min_stock',String(minS));
  params.set('sort',sortCol);
  params.set('order',sortAsc?'asc':'desc');
  params.set('limit',String(limit));
  params.set('offset',String(offset));
  params.set('include_meta','true');
  params.set('_t',String(Date.now()));
  return params.toString();
}

async function loadPrices(){
  if(_loadingPrices){_pendingLoad=true;return;}
  _loadingPrices=true;
  document.getElementById('loader').classList.add('active');
  currentOffset=0;
  allPrices=[];
  document.getElementById('cards').innerHTML='<div style="text-align:center;padding:24px;color:var(--text3)">Загрузка...</div>';
  const apiBase=API_URL||(location.origin+'/api/');
  try{
    const data=await fetchJ(apiBase+'prices?'+buildQuery(0,PAGE_SIZE));
    if(data && typeof data==='object' && !Array.isArray(data) && data.items){
      allPrices=normalizePrices(data.items);
      lastMeta=data.meta||null;
      currentOffset=allPrices.length;
      renderCards();
      updateListCount();
      updateKpis(lastMeta);
      renderChart(data.chart_meta||null);
      if(data.filter_options){
        const fo=data.filter_options;
        suppressSelectEvents=true;
        try{
          const selType=document.getElementById('selType');
          const prevType=selType.value;
          selType.innerHTML='<option value="">Все типы</option>'+fo.types.map(t=>'<option value="'+t.type+'">'+t.type+' ('+t.count+')</option>').join('');
          selType.value=fo.types.some(t=>t.type===prevType)?prevType:'';
          const selBrand=document.getElementById('selBrand');
          const prevBrand=selBrand.value;
          selBrand.innerHTML='<option value="">Все бренды</option>'+fo.brands.map(b=>'<option value="'+b.brand+'">'+b.brand+' ('+b.count+')</option>').join('');
          selBrand.value=fo.brands.some(b=>b.brand===prevBrand)?prevBrand:'';
          const selSource=document.getElementById('selSource');
          const prevSource=selSource.value;
          selSource.innerHTML='<option value="">Все источники</option>'+fo.sources.map(s=>'<option value="'+s.source+'">'+s.source+' ('+s.count+')</option>').join('');
          selSource.value=fo.sources.some(s=>s.source===prevSource)?prevSource:'';
          if(fo.capacities){
            const sortedCaps=fo.capacities.sort((a,b)=>capSortToBits(a.val)-capSortToBits(b.val));
            _capOptions=sortedCaps;
            updateCapBtn();
            _selectedCaps=_selectedCaps.filter(c=>sortedCaps.some(s=>s.val===c));
            if(document.getElementById('capPanel').style.display!=='none')renderCapChips();
          }
        }finally{
          suppressSelectEvents=false;
        }
      }
    }else{
      // backward compat: plain array
      allPrices=normalizePrices(data);
      lastMeta=null;
      currentOffset=allPrices.length;
      renderCards();
      updateListCount();
      updateKpis(null);
      renderChart(null);
    }
  }catch(e){
    document.getElementById('cards').innerHTML='<div style="text-align:center;padding:24px;color:#ef4444">Ошибка: '+esc(e.message)+'</div>';
  }finally{
    _loadingPrices=false;
    document.getElementById('loader').classList.remove('active');
    if(_pendingLoad){_pendingLoad=false;loadPrices();}
  }
}

function normalizePrices(data){
  const arr=Array.isArray(data)?data:(data.items||[]);
  return arr.map((p,i)=>{
    let cap=p.capacity||'';
    if(!cap){const m=(p.description||'').match(/(\d+(?:[\.,]\d+)?)\s*(Mb|Gb|TB|GB|MB|KB|Mbit|Gbit|Tbit)/i);if(m)cap=m[1]+m[2];}
    return{...p,type:p.chip_type||p.type||'',chip:p.part_number||p.chip||'',link:p.url||p.link||'',stock:p.stock??p.moq??0,capacity:String(cap||'').trim(),id:p.id??i};
  });
}

function capSortToBits(s){
  const m=String(s||'').match(/(\d+(?:\.\d+)?)\s*(Tb|Gb|Mb|Kb|TB|GB|MB|KB|Tbit|Gbit|Mbit|Kbit)/i);
  if(!m)return Number.MAX_SAFE_INTEGER;
  const n=parseFloat(m[1]);
  const u=m[2];
  if(/^(Tb|Tbit)$/i.test(u))return n*1024*1024;
  if(/^(GB)$/i.test(u))return n*8*1024;
  if(/^(Gb|Gbit)$/i.test(u))return n*1024;
  if(/^(MB)$/i.test(u))return n*8;
  if(/^(Mb|Mbit)$/i.test(u))return n;
  if(/^(KB)$/i.test(u))return n*8/1024;
  if(/^(Kb|Kbit)$/i.test(u))return n/1024;
  return n;
}

function updateSelectorsFromRows(rows){
  function collect(key){
    const m=new Map();
    rows.forEach(r=>{const v=String(r[key]||'').trim();if(!v)return;m.set(v,(m.get(v)||0)+1)});
    return [...m.entries()].map(([name,count])=>({name,count})).sort((a,b)=>a.name.localeCompare(b.name));
  }
  function fill(sel,items,label){
    const prev=sel.value;
    sel.innerHTML='<option value="">'+label+'</option>'+items.map(v=>'<option value="'+v.name+'">'+v.name+' ('+v.count+')</option>').join('');
    sel.value=items.some(v=>v.name===prev)?prev:'';
  }

  fill(document.getElementById('selType'),collect('type'),'Все типы');
  fill(document.getElementById('selBrand'),collect('brand'),'Все бренды');
  fill(document.getElementById('selSource'),collect('source'),'Все источники');

}

let histChart=null;
async function loadHistory(chip){
  const el=document.getElementById('histWrap');
  el.style.display='none';
  try{
    const apiBase=API_URL||(location.origin+'/api/');
    const data=await fetchJ(apiBase+'history/'+encodeURIComponent(chip));
    if(!data||!data.length)return;
    // Group by source, show timeline
    const srcMap={};
    data.forEach(r=>{if(!srcMap[r.source])srcMap[r.source]=[];srcMap[r.source].push(r);});
    const dates=[...new Set(data.map(r=>r.date))].sort();
    if(dates.length<1)return;
    el.style.display='block';
    const colors=['#10b981','#3b82f6','#f59e0b','#ef4444','#06b6d4','#84cc16'];
    const datasets=Object.entries(srcMap).map(([src,pts],i)=>({
      label:src,
      data:dates.map(d=>{const p=pts.find(x=>x.date===d);return p?p.price_usd:null;}),
      borderColor:colors[i%6],backgroundColor:colors[i%6]+'33',
      tension:0.3,pointRadius:3,pointBackgroundColor:colors[i%6],fill:false,spanGaps:true
    }));
    if(histChart)histChart.destroy();
    histChart=new Chart(document.getElementById('histCanvas'),{type:'line',data:{labels:dates,datasets},options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#a1a1aa',boxWidth:10,font:{size:10}}}},
      scales:{x:{grid:{display:false},ticks:{color:'#71717a',font:{size:9}}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#71717a',callback:v=>'$'+v}}}
    }});
  }catch(e){console.log('No history:',e)}
}

let mktData={},mktCatFilter='',mktSearch='';

async function loadMarket(){
  document.getElementById('mktCards').innerHTML='<div style="text-align:center;padding:32px;color:var(--text3)">Загрузка...</div>';
  try{
    const apiBase=API_URL||(location.origin+'/api/');
    mktData=await fetchJ(apiBase+'market');
    window.__marketLoaded=true;
    // Find latest fetched_at across all market items (actual crawl time, not price_date which is date-only)
    let maxD=null;
    for(const items of Object.values(mktData)){items.forEach(i=>{if(i.fetched_at&&(!maxD||i.fetched_at>maxD))maxD=i.fetched_at;});}
    window.__marketUpdated=maxD;
    document.getElementById('updBadge').textContent=fmtTime(maxD);
    renderMarket();
  }catch(e){
    document.getElementById('mktCards').innerHTML='<div style="text-align:center;padding:32px;color:#ef4444">Ошибка: '+esc(e.message)+'</div>';
  }
}

function renderMarket(){
  // Build category buttons (once)
  const cats=Object.keys(mktData).filter(c=>mktData[c].length>0);
  let btns='<button class="btn'+(mktCatFilter?'':' on')+'" onclick="mktCatFilter=\'\';renderMktCards()">Все</button>';
  cats.forEach(c=>{
    const m=CAT_META[c]||{name:c,icon:'📊'};
    btns+='<button class="btn'+(mktCatFilter===c?' on':'')+'" onclick="mktCatFilter=\''+c+'\';renderMktCards()">'+m.icon+' '+m.name+'</button>';
  });
  document.getElementById('mktCats').innerHTML=btns;
  // Populate volume dropdown from item names
  const volSet=new Set();
  for(const items of Object.values(mktData)){
    items.forEach(i=>{
      const m=i.item.match(/(\d+)\s*(Mb|Gb|GB|TB|MB|KB)/);
      if(m)volSet.add(m[1]+m[2]);
    });
  }
  const vols=[...volSet].sort((a,b)=>{
    const toBits=s=>{const n=parseInt(s);if(s.includes('TB'))return n*8*1024*1024;if(s.includes('GB'))return n*8*1024;if(s.includes('Gb'))return n*1024;if(s.includes('MB'))return n*8;if(s.includes('Mb'))return n;if(s.includes('KB'))return n*8/1024;return n;};
    return toBits(a)-toBits(b);
  });
  const selC=document.getElementById('mktCap');
  const volLabel=v=>{
    if(v.endsWith('Gb'))return v+' (чип)';
    if(v.endsWith('GB'))return v+' (модуль)';
    if(v.endsWith('Mb'))return v+' (чип)';
    if(v.endsWith('MB'))return v+' (модуль)';
    return v;
  };
  document.getElementById('mktCap').innerHTML='<option value="">Все объёмы</option>'+vols.map(v=>'<option value="'+v+'">'+volLabel(v)+'</option>').join('');
  renderMktCards();
}

function renderMktCards(){
  // Update cat buttons active state
  document.querySelectorAll('#mktCats .btn').forEach(b=>{
    const v=b.onclick?.toString().match(/mktCatFilter='([^']*)'/);
    if(v)b.classList.toggle('on',v[1]===mktCatFilter);
    else b.classList.toggle('on',!mktCatFilter);
  });
  const cats=Object.keys(mktData).filter(c=>mktData[c].length>0);
  const q=(document.getElementById('mktSearch')?.value||'').toLowerCase();
  const capVal=document.getElementById('mktCap')?.value||'';
  let html='';
  for(const cat of cats){
    if(mktCatFilter&&mktCatFilter!==cat)continue;
    const m=CAT_META[cat]||{name:cat,icon:'📊'};
    const good=mktData[cat].filter(i=>{
      if(q&&!i.item.toLowerCase().includes(q))return false;
      if(capVal){const re=new RegExp('\\b'+capVal.replace(/([()])/g,'\\$1')+'\\b');if(!re.test(i.item))return false;}
      return true;
    });
    if(!good.length)continue;
    html+='<div class="mkt-section"><div class="mkt-title"><span>'+m.icon+'</span> '+esc(m.name)+' <span style="font-size:10px;color:var(--text3);font-weight:400">('+good.length+')</span></div>';
    // Group by item name to merge sources
    const byName={};
    good.forEach(i=>{if(!byName[i.item])byName[i.item]=[];byName[i.item].push(i);});
    Object.entries(byName).forEach(([name,arr])=>{
      // Build price lines per source
      let priceLines='';
      arr.forEach(i=>{
        const avg=Number(i.session_avg||0),avgStr=avg>0?'$'+avg.toFixed(2):'—';
        const srcLabel=i.source==='dramexchange'?'DRAMeX':i.source==='whereismyram'?'WIMR':'TrendForce';
        const chg=String(i.session_change||'').trim();
        const chgNum=parseFloat(chg);
        let chgClass='flat',chgStr='';
        if(!isNaN(chgNum)&&chgNum>0){chgClass='up';chgStr='+'+chgNum.toFixed(2)+'%';}
        else if(!isNaN(chgNum)&&chgNum<0){chgClass='down';chgStr=chgNum.toFixed(2)+'%';}
        // WIMR trend badges
        let trendHtml='';
        if(i.percent_week!=null){const pw=Number(i.percent_week);const tc=pw>=0?'up':'down';trendHtml+='<span class="mkt-chg '+tc+'" style="font-size:10px">нед '+(pw>=0?'+':'')+pw.toFixed(1)+'%</span>';}
        if(i.percent_month!=null){const pm=Number(i.percent_month);const tc=pm>=0?'up':'down';trendHtml+='<span class="mkt-chg '+tc+'" style="font-size:10px">мес '+(pm>=0?'+':'')+pm.toFixed(1)+'%</span>';}
        priceLines+='<div class="mkt-row2" style="margin-top:2px">'+
          '<span class="mkt-src">'+srcLabel+'</span>'+
          '<span class="mkt-avg" style="font-size:14px">'+avgStr+'</span>'+
          (chgStr?'<span class="mkt-chg '+chgClass+'">'+esc(chgStr)+'</span>':'')+
          trendHtml+
          '</div>';
      });
      html+='<div class="mkt-card" onclick="openMktHistory(\''+esc(name).replace(/'/g,"\\'")+'\')">'+
        '<div class="mkt-item" style="margin-bottom:4px">'+esc(name)+'</div>'+priceLines+'</div>';
    });
    html+='</div>';
  }
  if(!html)html='<div style="text-align:center;padding:32px;color:var(--text3)">Ничего не найдено</div>';
  document.getElementById('mktCards').innerHTML=html;
}

      {label:'Средняя',data:avgs,borderColor:'#10b981',backgroundColor:grad,fill:true,tension:0.3,pointRadius:1,borderWidth:2},
      {label:'Макс',data:his,borderColor:'rgba(239,68,68,0.4)',borderDash:[4,4],pointRadius:0,borderWidth:1,fill:false},
      {label:'Мин',data:los,borderColor:'rgba(59,130,246,0.4)',borderDash:[4,4],pointRadius:0,borderWidth:1,fill:false}
    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
      plugins:{legend:{labels:{color:'#a1a1aa',boxWidth:10,font:{size:10}}},tooltip:{callbacks:{label:c=>c.dataset.label+': $'+c.raw?.toFixed(2)}}},
      scales:{x:{grid:{display:false},ticks:{color:'#71717a',font:{size:8},maxTicksLimit:8}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#71717a',callback:v=>'$'+v}}}
    }});
    // Stats from graph + all sources for this item
    const tfLast=avgs[avgs.length-1],tfFirst=avgs[0];
    const tfChange=tfFirst>0?((tfLast-tfFirst)/tfFirst*100).toFixed(1):'?';
    const min=Math.min(...avgs.filter(v=>v>0)),max=Math.max(...avgs);
    // Collect all sources for this item
    let srcHtml='';
    for(const[cat,items] of Object.entries(mktData)){
      items.filter(i=>i.item===item&&Number(i.session_avg)>0).forEach(i=>{
        const p=Number(i.session_avg);
        const src=i.source==='dramexchange'?'DRAMeXchange (сегодня)':'TrendForce ('+d1+')';
        srcHtml+='<div class="src-row"><span class="src-name">'+esc(src)+'</span><span class="src-price">$'+p.toFixed(2)+'</span></div>';
      });
    }
    document.getElementById('mSources').innerHTML=
      '<div class="modal-label" style="margin-top:12px">Источники</div>'+srcHtml+
      '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:12px">'+
      '<div class="src-row"><span class="src-name">За период</span><span class="src-price" style="color:'+(parseFloat(tfChange)>=0?'var(--accent)':'#ef4444')+'">'+tfChange+'%</span></div>'+
      '<div class="src-row"><span class="src-name">TF последняя</span><span class="src-price">$'+tfLast.toFixed(2)+'</span></div>'+
      '<div class="src-row"><span class="src-name">Минимум</span><span class="src-price">$'+min.toFixed(2)+'</span></div>'+
      '<div class="src-row"><span class="src-name">Максимум</span><span class="src-price">$'+max.toFixed(2)+'</span></div></div>';
  }catch(e){
    document.getElementById('mSub').textContent='Только текущая цена (DRAMeXchange). История появится при следующих обновлениях.';
    // Show current price from mktData
    for(const[cat,items] of Object.entries(mktData)){
      const found=items.find(i=>i.item===item&&Number(i.session_avg)>0);
      if(found){
        const avg=Number(found.session_avg);
        document.getElementById('mSources').innerHTML=
          '<div class="src-row" style="border-color:var(--accent)"><span class="src-name">Текущая цена</span><span class="src-price" style="color:var(--accent)">$'+avg.toFixed(2)+'</span></div>'+
          (found.daily_high?'<div class="src-row"><span class="src-name">Диапазон</span><span class="src-price">$'+Number(found.daily_low).toFixed(2)+' — $'+Number(found.daily_high).toFixed(2)+'</span></div>':'')+
          '<div style="font-size:11px;color:var(--text3);margin-top:8px;text-align:center">Источник: '+esc(found.source)+' · Обновляется каждые 4 часа</div>';
        break;
      }
    }
  }
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  if(tg?.BackButton)tg.BackButton.hide();
}

async function openCapDetail(capacity, mode){
  document.getElementById('mTitle').textContent=capacity;
  document.getElementById('mSub').textContent=mode==='price'?'Средние цены по типам':'Стоки по типам';
  document.getElementById('mSources').innerHTML='<div style="text-align:center;padding:12px;color:var(--text3)">Загрузка...</div>';
  document.getElementById('overlay').classList.add('show');
  if(tg?.BackButton){tg.BackButton.show();tg.BackButton.onClick(closeModal)}
  const apiBase=API_URL||(location.origin+'/api/');
  try{
    const data=await fetchJ(apiBase+'prices?capacity='+encodeURIComponent(capacity)+'&limit=1000&_t='+Date.now());
    const items=normalizePrices(data);
    // Group by chip_type
    const byType={};
    items.forEach(p=>{
      const t=p.type||'Другое';
      if(!byType[t])byType[t]={prices:[],stock:0,count:0};
      byType[t].count++;
      if(p.price_usd>0)byType[t].prices.push(p.price_usd);
      byType[t].stock+=(p.stock||0);
    });
    // Sort by count desc
    const sorted=Object.entries(byType).sort((a,b)=>b[1].count-a[1].count);
    // Build source rows
    let html='<div class="modal-label">Разбивка по типам ('+items.length+' позиций)</div>';
    sorted.forEach(([type,d])=>{
      const avgPrice=d.prices.length>0?(d.prices.reduce((a,b)=>a+b,0)/d.prices.length):0;
      const priceStr=avgPrice>0?'$'+avgPrice.toFixed(2):'—';
      const stockStr=d.stock>0?d.stock.toLocaleString()+' шт':'—';
      html+='<div class="src-row">'+
        '<span class="src-name">'+esc(type)+' <span style="color:var(--text3);font-size:10px">('+d.count+')</span></span>'+
        '<span class="src-stock">'+stockStr+'</span>'+
        '<span class="src-price">'+priceStr+'</span>'+
        '</div>';
    });
    document.getElementById('mSources').innerHTML=html;
    // Chart: horizontal bar by type
    if(detailChart){detailChart.destroy();detailChart=null;}
    const chartData=sorted.slice(0,8);
    const values=mode==='price'
      ?chartData.map(([_,d])=>d.prices.length>0?+(d.prices.reduce((a,b)=>a+b,0)/d.prices.length).toFixed(2):0)
      :chartData.map(([_,d])=>d.stock);
    const labels=chartData.map(([t])=>t);
    detailChart=new Chart(document.getElementById('mChart'),{
      type:'bar',
      data:{labels,datasets:[{
        data:values,
        backgroundColor:'rgba(16,185,129,0.6)',
        borderColor:'rgba(52,211,153,0.8)',
        borderWidth:1,borderRadius:6,barThickness:20
      }]},
      options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{
          label:c=>mode==='price'?'$'+c.raw.toFixed(2):c.raw.toLocaleString()+' шт'
        }}},
        scales:{
          x:{grid:{color:'rgba(16,185,129,0.06)'},ticks:{color:'#10b981',callback:v=>mode==='price'?'$'+v:v>=1000?(v/1000|0)+'K':v}},
          y:{grid:{display:false},ticks:{color:'#a1a1aa',font:{size:11}}}
        }
      }
    });
    // Hide history section — not relevant for capacity detail
    document.getElementById('histWrap').style.display='none';
  }catch(e){
    document.getElementById('mSources').innerHTML='<div style="text-align:center;padding:12px;color:#ef4444">Ошибка: '+esc(e.message)+'</div>';
  }
}

function fmtTime(iso){
  if(!iso)return'--';
  try{const d=new Date(iso),now=new Date(),m=Math.round((now-d)/60000);
    if(m<1)return'только что';if(m<60)return m+' мин назад';
    const h=Math.round(m/60);if(h<24)return h+' ч назад';
    return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
  }catch(e){return'--'}
}

async function fetchJ(url){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),30000);
  try{const r=await fetch(url,{signal:ctrl.signal});if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}finally{clearTimeout(t)}
}

async function init(){
  const apiBase=API_URL||(location.origin+'/api/');
  const t=Date.now();
  try{
    const[stats,types,brands,sources,caps]=await Promise.all([
      fetchJ(apiBase+'stats?_t='+t),
      fetchJ(apiBase+'types?_t='+t),
      fetchJ(apiBase+'brands?_t='+t),
      fetchJ(apiBase+'sources?_t='+t),
      fetchJ(apiBase+'capacities?_t='+t)
    ]);
    // KPIs from stats (save globally for tab switch restore)
    window.__globalStats=stats;
    animN('kTotal',stats.total||0);
    animN('kStock',stats.in_stock||0);
    animN('kSources',stats.sources||0);
    animN('kTypes',stats.types||0);
    document.getElementById('updBadge').textContent=fmtTime(stats?.updated);
    // Initial selector population from stats endpoints (before first load)
    allTypes=(types||[]).map(t=>({name:t.type,count:t.count}));
    allBrands=(brands||[]).map(b=>({name:b.brand,count:b.count}));
    allSources=(sources||[]).map(s=>({name:s.source,count:s.count}));
    suppressSelectEvents=true;
    try{
      document.getElementById('selType').innerHTML='<option value="">Все типы</option>'+allTypes.map(v=>'<option value="'+v.name+'">'+v.name+'</option>').join('');
      document.getElementById('selBrand').innerHTML='<option value="">Все бренды</option>'+allBrands.map(v=>'<option value="'+v.name+'">'+v.name+'</option>').join('');
      document.getElementById('selSource').innerHTML='<option value="">Все источники</option>'+allSources.map(v=>'<option value="'+v.name+'">'+v.name+'</option>').join('');
      const sortedCaps=(caps||[]).map(c=>c.val).sort((a,b)=>capSortToBits(a)-capSortToBits(b));
      _capOptions=sortedCaps.map(c=>({val:c,count:0}));
    }finally{
      suppressSelectEvents=false;
    }
    // Load first batch (full set under current filters)
    await loadPrices();
  }catch(e){
    console.error('API error:',e);
    document.getElementById('updBadge').textContent='Ошибка: '+e.message;
  }
}
init();

// Close cap panel when tapping outside
document.addEventListener('click',function(e){
  const panel=document.getElementById('capPanel');
  const btn=document.getElementById('capBtn');
  if(panel.style.display!=='none'&&!panel.contains(e.target)&&e.target!==btn){
    panel.style.display='none';
  }
});
</script>
